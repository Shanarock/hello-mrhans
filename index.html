    <title>A Special Message for You</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-container">

        <div id="page-2" class="page hidden">
            <div class="card-body">
                <h3>Dear hans,</h3>
                <p>my love</p>
                    <p>Even i am far away</p>
                      <p>i am close to your heart</p>

        </div>

        <div id="page-3" class="page hidden">

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
